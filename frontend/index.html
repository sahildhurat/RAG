    <script>
        // API Configuration — auto-detect local dev vs production
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://rag-backend-e6q6.onrender.com';

        document.addEventListener('DOMContentLoaded', () => {
            const chatContainer = document.querySelector('.chat-container');
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            
            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            scrollToBottom();

            async function sendMessage() {
                const query = chatInput.value.trim();
                if (!query) return;
                
                // Add user message to UI
                const userMsg = `
                <div class="flex gap-4 flex-row-reverse fade-in-up" style="animation-delay: 0.1s;">
                    <div class="w-10 h-10 rounded-full bg-surface-container border border-white/10 flex-shrink-0 flex items-center justify-center overflow-hidden">
                        <span class="material-symbols-outlined text-secondary">person</span>
                    </div>
                    <div class="p-glass-padding rounded-2xl rounded-tr-sm max-w-[85%] relative overflow-hidden">
                        <div class="absolute inset-0 bg-[rgba(139,92,246,0.2)]"></div>
                        <p class="font-body-md text-body-md text-on-surface relative z-10">${query}</p>
                    </div>
                </div>`;
                chatMessages.insertAdjacentHTML('beforeend', userMsg);
                chatInput.value = '';
                scrollToBottom();

                // Add loading state
                const loadingId = 'loading-' + Date.now();
                const loadingMsg = `
                <div id="${loadingId}" class="flex gap-4 fade-in-up" style="animation-delay: 0.1s;">
                    <div class="w-10 h-10 rounded-full bg-surface-container border border-white/10 flex-shrink-0 flex items-center justify-center">
                        <span class="material-symbols-outlined text-secondary text-sm">smart_toy</span>
                    </div>
                    <div class="glass-panel p-glass-padding rounded-2xl rounded-tl-sm max-w-[85%]">
                        <p class="font-body-md text-body-md text-on-surface">Thinking...</p>
                    </div>
                </div>`;
                chatMessages.insertAdjacentHTML('beforeend', loadingMsg);
                scrollToBottom();

                // Make API request
                try {
                    const response = await fetch(`${API_URL}/chat`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query: query })
                    });
                    const data = await response.json();
                    
                    document.getElementById(loadingId).remove();
                    
                    const assistantMsg = `
                    <div class="flex gap-4 fade-in-up" style="animation-delay: 0.1s;">
                        <div class="w-10 h-10 rounded-full bg-surface-container border border-white/10 flex-shrink-0 flex items-center justify-center">
                            <span class="material-symbols-outlined text-secondary text-sm">smart_toy</span>
                        </div>
                        <div class="glass-panel p-glass-padding rounded-2xl rounded-tl-sm max-w-[85%] space-y-4">
                            <p class="font-body-md text-body-md text-on-surface">${data.response}</p>
                        </div>
                    </div>`;
                    chatMessages.insertAdjacentHTML('beforeend', assistantMsg);
                    scrollToBottom();
                } catch (error) {
                    document.getElementById(loadingId).remove();
                    const errorMsg = `
                    <div class="flex gap-4 fade-in-up" style="animation-delay: 0.1s;">
                        <div class="w-10 h-10 rounded-full bg-surface-container border border-white/10 flex-shrink-0 flex items-center justify-center">
                            <span class="material-symbols-outlined text-error text-sm">error</span>
                        </div>
                        <div class="glass-panel p-glass-padding rounded-2xl rounded-tl-sm max-w-[85%] border-error/50">
                            <p class="font-body-md text-body-md text-error">Error connecting to the server.</p>
                        </div>
                    </div>`;
                    chatMessages.insertAdjacentHTML('beforeend', errorMsg);
                    scrollToBottom();
                }
            }

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>
